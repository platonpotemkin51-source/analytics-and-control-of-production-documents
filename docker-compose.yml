version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: woodflow
      POSTGRES_USER: woodflow
      POSTGRES_PASSWORD: woodflow
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    build: .
    depends_on: [db]
    environment:
      DATABASE_URL: postgresql+psycopg2://woodflow:woodflow@db:5432/woodflow
      SECRET_KEY: super-secret-key
    ports:
      - "8000:8000"
  nginx:
    image: nginx:1.27
    depends_on: [backend]
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  pg_data:
